version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - safety-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/safety_db
      - SPRING_DATASOURCE_USERNAME=safety_user
      - SPRING_DATASOURCE_PASSWORD=safety_pass
      - AI_MODEL_URL=http://ai-model:5000
    depends_on:
      - db
      - ai-model
    networks:
      - safety-network

  ai-model:
    build:
      context: ../ai-model
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ../ai-model/models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - safety-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=safety_db
      - MYSQL_USER=safety_user
      - MYSQL_PASSWORD=safety_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - safety-network

volumes:
  mysql_data:

networks:
  safety-network:
    driver: bridge
